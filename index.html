<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laymur</title>

    <style>
      :root {
        --bg: #141414;
        --card: #252525;
        --card-hover: #2e2e2e;
        --border: rgba(255, 255, 255, 0.07);
        --text: #cccccc;
        --text-muted: #666666;
        --accent: #4d9fff;
        --radius: 6px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: var(--font);
        color: var(--text);
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 260px;
      }

      .card {
        display: block;
        text-decoration: none;
        padding: 28px 20px;
        border-radius: var(--radius);
        background: var(--card);
        border: 1px solid var(--border);
        text-align: center;
        transition: 0.15s ease;
        color: var(--text);
      }

      .card:hover {
        background: var(--card-hover);
        border-color: var(--accent);
        transform: translateY(-2px);
      }

      .title {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .subtitle {
        margin-top: 6px;
        font-size: 12px;
        color: var(--text-muted);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <a href="./editor/index.html" class="card">
        <div class="title">EDITOR</div>
        <div class="subtitle">Visual editor</div>
      </a>

      <a href="./examples/index.html" class="card">
        <div class="title">EXAMPLES</div>
        <div class="subtitle">Docs & usage</div>
      </a>
    </div>
  </body>
</html>
