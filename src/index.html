<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laymur Editor</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div id="app">
      <!-- Viewport (60%) -->
      <div id="viewport">
        <div id="viewport-toolbar">
          <!-- Toolbar content -->
        </div>
        <div id="viewport-content">
          <div id="preview-container">
            <iframe id="preview-frame" src="./preview.html"></iframe>
            <div id="preview-resize-handle"></div>
          </div>
        </div>
      </div>

      <!-- Panel (40%) -->
      <div id="panel">
        <div id="tabs">
          <button class="tab-button" data-tab="layers">Layers</button>
          <button class="tab-button" data-tab="elements">Elements</button>
          <button class="tab-button" data-tab="constraints">Constraints</button>
          <button class="tab-button active" data-tab="project">Project</button>
        </div>

        <div id="tab-content">
          <!-- Layers tab -->
          <div id="tab-layers" class="tab-panel"></div>

          <!-- Elements tab -->
          <div id="tab-elements" class="tab-panel"></div>

          <!-- Constraints tab -->
          <div id="tab-constraints" class="tab-panel"></div>

          <!-- Project tab -->
          <div id="tab-project" class="tab-panel active"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
