<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laymur Editor</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Viewport (60%) -->
      <div id="viewport">
        <div id="viewport-toolbar">
          <!-- Toolbar content -->
        </div>
        <div id="viewport-content">
          <iframe id="preview-frame" src="./preview.html"></iframe>
        </div>
      </div>

      <!-- Panel (40%) -->
      <div id="panel">
        <div id="tabs">
          <button class="tab-button active" data-tab="assets">Assets</button>
          <button class="tab-button" data-tab="layers">Layers</button>
          <button class="tab-button" data-tab="elements">Elements</button>
          <button class="tab-button" data-tab="constraints">Constraints</button>
          <button class="tab-button" data-tab="export">Export</button>
        </div>

        <div id="tab-content">
          <!-- Assets tab -->
          <div id="tab-assets" class="tab-panel active">
            <div class="tab-scroll-area">
              <div id="assets-grid"></div>
            </div>
            <div class="tab-footer">
              <button id="button-add-asset" class="button-primary">+ Add Texture</button>
              <input type="file" id="input-asset-file" accept="image/*" multiple hidden />
            </div>
          </div>

          <!-- Layers tab -->
          <div id="tab-layers" class="tab-panel">
            <div class="tab-scroll-area">
              <div id="layers-content"></div>
            </div>
          </div>

          <!-- Elements tab -->
          <div id="tab-elements" class="tab-panel">
            <div class="tab-scroll-area">
              <div id="elements-content"></div>
            </div>
          </div>

          <!-- Constraints tab -->
          <div id="tab-constraints" class="tab-panel">
            <div class="tab-scroll-area">
              <div id="constraints-content"></div>
            </div>
          </div>

          <!-- Export tab -->
          <div id="tab-export" class="tab-panel">
            <div class="tab-scroll-area">
              <div id="export-content"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./js/index.js"></script>
  </body>
</html>
